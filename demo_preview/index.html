<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resilience Compass — On-device Gemma (Ollama)</title>
<style>
  :root{
    --bg:#0B1220; --surface:#141C2B; --surfaceAlt:#1C2740; --border:#243048;
    --primary:#3DD6C4; --accent:#6C8CFF; --text:#E6ECF5; --textSec:#95A3B8;
    --good:#4ADE80; --warn:#F5B841; --danger:#FF6B6B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#05070d;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .page{min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 12px;}
  .banner{max-width:430px;width:100%;font-size:12px;color:var(--textSec);text-align:center;line-height:1.5}
  .banner b{color:var(--good)}
  .device{width:430px;max-width:100%;height:820px;background:var(--bg);border:1px solid var(--border);
    border-radius:28px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative}
  .screen{flex:1;overflow-y:auto;overflow-x:hidden}
  .pad{padding:20px}
  h1{font-size:24px;font-weight:800;margin:0}
  h2{font-size:18px;font-weight:700;margin:0}
  .sub{color:var(--textSec)}
  .row{display:flex;align-items:center;gap:8px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;
    background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);color:var(--good);font-size:12px;font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good)}
  .label{font-size:14px;font-weight:600;margin:0 0 8px}
  .hint{font-size:12px;color:var(--textSec);margin:0 0 8px}
  .chip{padding:8px 12px;border-radius:999px;background:var(--surfaceAlt);border:1px solid var(--border);
    color:var(--text);font-size:13px;cursor:pointer;user-select:none}
  .chip.sel{background:rgba(61,214,196,.18);border-color:var(--primary)}
  .wrap{display:flex;flex-wrap:wrap;gap:8px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:8px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:14px;
    background:var(--primary);color:#04231F;font-weight:600;border:none;cursor:pointer;font-size:14px;width:100%}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.tonal{background:rgba(61,214,196,.16);color:var(--primary);width:auto}
  .btn.ghost{background:transparent;color:var(--textSec);width:auto}
  .btn.sm{padding:8px 12px;font-size:13px;width:auto}
  input,textarea,select{width:100%;background:var(--surfaceAlt);border:1px solid var(--border);color:var(--text);
    border-radius:12px;padding:11px 12px;font-size:14px;font-family:inherit;outline:none}
  input:focus,textarea:focus{border-color:var(--primary)}
  textarea{resize:vertical}
  .tile{background:var(--surfaceAlt);border:1px solid var(--border);border-radius:12px;padding:12px}
  .checkrow{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
  .cbox{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--border);flex:0 0 auto;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#04231F}
  .cbox.on{background:var(--primary);border-color:var(--primary)}
  .cbox.lock{background:var(--surface);color:var(--textSec)}
  .pill{padding:3px 8px;border-radius:8px;font-size:10px;background:var(--surfaceAlt);color:var(--textSec)}
  .progress{height:8px;border-radius:999px;background:var(--surfaceAlt);overflow:hidden}
  .progress > i{display:block;height:100%;background:var(--primary);width:0;transition:width .2s}
  .appbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
  .appbar .icons{display:flex;gap:6px;align-items:center}
  .iconbtn{background:transparent;border:none;color:var(--text);cursor:pointer;font-size:18px;padding:6px;border-radius:8px}
  .tabbar{display:flex;border-top:1px solid var(--border);background:var(--surface)}
  .tab{flex:1;text-align:center;padding:10px 4px;color:var(--textSec);cursor:pointer;font-size:12px}
  .tab.sel{color:var(--primary)}
  .tab .ic{font-size:18px;display:block;margin-bottom:2px}
  .bubble{max-width:86%;padding:12px 14px;border-radius:16px;margin:6px 0;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .bubble.a{background:var(--surface);border:1px solid var(--border);align-self:flex-start}
  .bubble.u{background:rgba(61,214,196,.14);border:1px solid rgba(61,214,196,.4);align-self:flex-end}
  .chatcol{display:flex;flex-direction:column;padding:0 16px}
  .mbadge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-top:10px}
  .cite{display:inline-block;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:600;margin:6px 6px 0 0;
    background:rgba(108,140,255,.12);border:1px solid rgba(108,140,255,.35);color:var(--accent)}
  .seg{display:flex;border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .seg > div{flex:1;text-align:center;padding:9px 4px;cursor:pointer;font-size:13px;color:var(--text);border-right:1px solid var(--border)}
  .seg > div:last-child{border-right:none}
  .seg > div.sel{background:rgba(61,214,196,.18);color:var(--primary);font-weight:600}
  .gauge{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
  .gauge .hole{position:absolute;inset:8px;background:var(--surface);border-radius:50%}
  .gauge span{position:relative;font-size:28px;font-weight:800}
  .tag{display:inline-block;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:600;margin:0 6px 6px 0}
  .divider{height:1px;background:var(--border);margin:16px 0}
  .sechead{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
  .empty{color:var(--textSec);font-style:italic;padding:10px 0}
  .modal{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20}
  .sheet{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;width:100%;max-height:90%;overflow-y:auto}
  .field{margin-bottom:10px}
  .field small{color:var(--textSec);display:block;margin-bottom:4px}
  .cursor{display:inline-block;width:7px;height:1em;background:var(--primary);vertical-align:text-bottom;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .fadein{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .modeltag{font-size:10px;color:var(--primary);background:rgba(61,214,196,.12);border:1px solid rgba(61,214,196,.3);padding:2px 6px;border-radius:6px}
</style>
</head>

// ================= scoring + concentration (deterministic, on-device) =================
function sevWeight(s){return s==='low'?1:s==='high'?3:2}
function computeScore(sev,lik,ctrl){
  const s=sevWeight(sev),l=Math.min(3,Math.max(1,lik)),c=Math.min(4,Math.max(1,ctrl));
  const inh=(s*l-1)/8, cf=(c-1)/3, res=inh*(1-cf);
  return Math.max(0,Math.min(100,Math.round(100*(1-res))));
}
function concentrationRisks(){
  const by={};
  state.vendors.forEach(v=>{
    const seen=new Set();
    (v.nth||[]).forEach(p=>{const k=p.trim().toLowerCase();if(!k||seen.has(k))return;seen.add(k);
      if(!by[k])by[k]={display:p.trim(),vendors:[]}; if(!by[k].vendors.includes(v.vendor))by[k].vendors.push(v.vendor);});
  });
  return Object.values(by).filter(a=>a.vendors.length>=2).sort((a,b)=>b.vendors.length-a.vendors.length);
}

// ================= real Gemma via local Ollama (through same-origin proxy) =================
function gemmaVer(name){const m=name.match(/gemma\s*([0-9]+)/i); return m?parseInt(m[1],10):0;}
async function detectModel(){
  const r=await fetch('/api/tags',{cache:'no-store'});
  if(!r.ok) throw new Error('Ollama not reachable (HTTP '+r.status+')');
  const j=await r.json();
  const names=(j.models||[]).map(m=>m.name);
  // Prefer the newest Gemma generation present (gemma4 > gemma3 > …).
  const gemmas=names.filter(n=>/gemma/i.test(n)).sort((a,b)=>gemmaVer(b)-gemmaVer(a));
  const tag = gemmas[0] || names[0];
  if(!tag) throw new Error('No model in Ollama. Run:  ollama pull gemma4:12b');
  return tag;
}
async function ollamaChat(messages,{json=false,temperature=0.6,onToken}={}){
  const body={model:state.modelTag,messages,stream:true,options:{temperature}};
  if(json) body.format='json';
  const resp=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok) throw new Error('Gemma call failed (HTTP '+resp.status+')');
  const reader=resp.body.getReader(); const dec=new TextDecoder(); let buf='',full='';
  while(true){
    const {done,value}=await reader.read(); if(done)break;
    buf+=dec.decode(value,{stream:true}); let i;
    while((i=buf.indexOf('\n'))>=0){
      const line=buf.slice(0,i).trim(); buf=buf.slice(i+1); if(!line)continue;
      let o; try{o=JSON.parse(line)}catch(e){continue}
      if(o.error) throw new Error(o.error);
      const t=o.message&&o.message.content||''; if(t){full+=t; onToken&&onToken(t,full);}
    }
  }
  return full;
}

function groundingFor(pillar){

      return '- '+t.service+': '+(o||'(no objectives set)');});

  if(pillar.id==='third-party'&&state.vendors.length){

    const rk=risks.length?'\nConcentration risks (shared Nth-parties): '+risks.map(r=>r.display+' (shared by '+r.vendors.join(', ')+')').join('; '):'';
    return '\n\nThe practitioner has mapped these vendors/Nth-parties in the Tools panel — use them directly:\n'+lines.join('\n')+rk;
  }
  return '';
}

// ================= output parsing (ported from json_extractor.dart) =================
const ASSESS='[[ASSESSMENT]]';
function firstJsonObject(s){
  const start=s.indexOf('{'); if(start<0)return null;
  let depth=0,inStr=false,esc2=false;
  for(let i=start;i<s.length;i++){const ch=s[i];
    if(inStr){ if(esc2){esc2=false;} else if(ch==='\\'){esc2=true;} else if(ch==='"'){inStr=false;} continue; }
    if(ch==='"'){inStr=true;} else if(ch==='{'){depth++;} else if(ch==='}'){depth--; if(depth===0)return s.slice(start,i+1);}
  }
  return null;
}
function displayText(raw){const i=raw.indexOf(ASSESS); return (i>=0?raw.slice(0,i):raw).trim();}
function extractAssessment(raw){
  const i=raw.indexOf(ASSESS); if(i<0)return null;
  const tail=raw.slice(i+ASSESS.length);
  let m=null; const obj=firstJsonObject(tail);
  if(obj){ try{m=JSON.parse(obj)}catch(e){} }
  if(!m){ // tolerant fallback for slightly-malformed JSON (e.g. a stray "maturity": 2>)
    const mm=tail.match(/"maturity"\s*:\s*(\d)/); if(!mm)return null;
    const rr=tail.match(/"rationale"\s*:\s*"([^"]*)"/);
    const cc=tail.match(/"citations"\s*:\s*\[([^\]]*)\]/);
    m={maturity:parseInt(mm[1],10), rationale:rr?rr[1]:'',
       citations:cc?(cc[1].match(/"([^"]*)"/g)||[]).map(x=>x.replace(/"/g,'')):[]};
  }
  let mat=m.maturity; if(typeof mat==='string')mat=parseInt(mat,10);
  mat=(typeof mat==='number'&&!isNaN(mat))?Math.max(1,Math.min(4,Math.round(mat))):null;
  const cites=Array.isArray(m.citations)?m.citations.map(x=>(''+x).trim()).filter(Boolean):[];
  return {maturity:mat,citations:cites,rationale:(m.rationale||'').toString()};
}
function extractIncident(raw){
  const obj=firstJsonObject(raw); if(!obj)return null;
  let m; try{m=JSON.parse(obj)}catch(e){return null}
  let cat=(m.category||'').toString().trim().toLowerCase();
  if(!CATEGORIES.includes(cat)){
    cat = CATEGORIES.find(c=>cat.includes(c)||c.includes(cat))
      || (/(vendor|supplier|party)/.test(cat)?'third-party':/(tech|system|it)/.test(cat)?'technology':'process');
  }
  let sev=(m.severity||'').toString().trim().toLowerCase(); if(sev==='moderate')sev='medium';
  if(!['low','medium','high'].includes(sev))sev='medium';
  return {category:cat,severity:sev,impactArea:(m.impactArea||m.impact_area||'').toString().trim(),rationale:(m.rationale||'').toString().trim()};
}

  const s=S();
  const tol=state.tolerances.length? state.tolerances.map((t,i)=>{
    const objs=[t.rto&&'RTO '+t.rto,t.rpo&&'RPO '+t.rpo,t.mtpd&&'MTPD '+t.mtpd,t.srto&&'SRTO '+t.srto].filter(Boolean);
    return `<div class="card between"><div><b>${esc(t.service)}</b><div style="margin-top:8px">${objs.length?objs.map(o=>`<span class="tag" style="color:var(--primary);background:#3DD6C422;border:1px solid #3DD6C480">${esc(o)}</span>`).join(''):'<span class="sub">—</span>'}</div></div>
      <button class="iconbtn" data-del="tol" data-i="${i}">🗑</button></div>`}).join('') : `<div class="empty">${s.emptyTol}</div>`;
  const ven=state.vendors.length? state.vendors.map((v,i)=>`<div class="card between"><div><b>${esc(v.vendor)}</b>${v.service?`<div class="hint" style="margin:2px 0 0">${esc(v.service)}</div>`:''}
      <div style="margin-top:8px">${(v.nth&&v.nth.length)?v.nth.map(p=>`<span class="tag" style="color:var(--accent);background:#6C8CFF22;border:1px solid #6C8CFF59">${esc(p)}</span>`).join(''):'<span class="sub">—</span>'}</div></div>
      <button class="iconbtn" data-del="ven" data-i="${i}">🗑</button></div>`).join('') : `<div class="empty">${s.emptyVen}</div>`;
  const risks=concentrationRisks(); const acc=risks.length?'var(--warn)':'var(--good)';
  const riskBody=risks.length? risks.map(r=>`<div style="margin-bottom:10px"><div class="row"><span class="tag" style="color:var(--danger);background:#FF6B6B22;border:1px solid #FF6B6B80;margin:0">${esc(r.display)}</span>
      <span style="color:var(--danger);font-weight:600;font-size:12px">shared by ${r.vendors.length} vendors</span></div>
      <div class="hint" style="margin-top:4px">${r.vendors.map(esc).join(' · ')}</div></div>`).join('') : `<div class="sub">${s.noconc}</div>`;
  return `<div class="pad fadein"><div class="sub" style="line-height:1.4">${s.toolsIntro}</div><div style="height:20px"></div>
    <div class="sechead">⏱️ ${s.tolTitle}</div><div style="height:8px"></div>${tol}
    <div style="text-align:right"><button class="btn ghost sm" data-act="addtol">+ ${s.add}</button></div>
    <div class="divider"></div>
    <div class="sechead">🔗 ${s.nthTitle}</div><div style="height:8px"></div>${ven}
    <div style="text-align:right"><button class="btn ghost sm" data-act="addven">+ ${s.add}</button></div>
    <div style="height:16px"></div>
    <div class="card"><div class="row" style="color:${acc}"><span>${risks.length?'⚠️':'✅'}</span><b style="color:var(--text)">${s.conc}</b></div>
      <div style="height:10px"></div>${riskBody}</div></div>`;
}
function gauge(score,size){const col=bandColor(score);
  return `<div class="gauge" style="width:${size}px;height:${size}px;background:conic-gradient(${col} ${score*3.6}deg, var(--surfaceAlt) 0)">
    <div class="hole"></div><span style="color:${col};font-size:${size*0.3}px">${score}</span></div>`;}

// ================= modals =================
function tolModal(){const s=S();return `<div class="modal"><div class="sheet fadein"><h2>${s.tolTitle}</h2><div style="height:12px"></div>
  <div class="field"><small>${s.service}</small><input id="m_service"></div>
  <div class="field"><small>RTO</small><input id="m_rto" placeholder="e.g. 4h"></div>
  <div class="field"><small>RPO</small><input id="m_rpo" placeholder="e.g. 15m"></div>
  <div class="field"><small>MTPD</small><input id="m_mtpd" placeholder="e.g. 24h"></div>
  <div class="field"><small>SRTO</small><input id="m_srto"></div>
  <div class="between" style="margin-top:8px"><button class="btn ghost sm" data-act="closemodal">Cancel</button><button class="btn sm" data-act="savetol">${s.add}</button></div></div></div>`}
function venModal(){const s=S();return `<div class="modal"><div class="sheet fadein"><h2>${s.nthTitle}</h2><div style="height:12px"></div>
  <div class="field"><small>${s.vendor}</small><input id="m_vendor"></div>
  <div class="field"><small>${s.provided}</small><input id="m_prov"></div>
  <div class="field"><small>${s.nth}</small><input id="m_nth" placeholder="AWS, Cloudflare, ..."></div>
  <div class="between" style="margin-top:8px"><button class="btn ghost sm" data-act="closemodal">Cancel</button><button class="btn sm" data-act="saveven">${s.add}</button></div></div></div>`}
function aboutModal(){const s=S();return `<div class="modal"><div class="sheet fadein"><span class="badge"><span class="dot"></span>${s.offline}</span>
  <div style="height:14px"></div><div class="card"><div class="row"><span>🔒</span><div>${s.privacy}</div></div></div>
  <div class="hint">On-device model (Ollama): <span class="modeltag">${esc(state.modelTag||'—')}</span></div><div style="height:8px"></div>
  <div class="card"><div class="row"><span>ℹ️</span><b>${s.disc}</b></div><div class="hint" style="margin-top:8px">${DISCLAIMER}</div></div>
  <div style="text-align:right;margin-top:8px"><button class="btn sm" data-act="closemodal">OK</button></div></div></div>`}

// ================= behaviour =================
function persist(){LS.set('lang',state.lang);LS.set('juris',[...state.juris]);LS.set('tol',state.tolerances);LS.set('ven',state.vendors)}
function scrollChat(){const c=document.getElementById('chat');if(c)c.scrollTop=c.scrollHeight}

async function loadModel(){
  state.modelStatus='loading';state.progress=0.1;state.modelError=null;render();
  try{
    state.modelTag=await detectModel(); state.progress=0.5; render();
    await ollamaChat([{role:'user',content:'Reply with the single word: ready'}],{temperature:0,onToken:()=>{}}); // warm
    state.progress=1;state.modelStatus='ready';persist();render();
  }catch(e){ state.modelStatus='error'; state.modelError=e.message; render(); }
}
function start(){state.screen='home';state.tab='assistant';state.pillar=0;state.messages=[];state.convo=[];state.assessments={};state.complete=false;render();openPillar();}

async function openPillar(){
  if(state.busy)return;
  const p=PILLARS[state.pillar];
  state.messages=[]; state.convo=[{role:'system',content:bcmSystemPrompt(p)}]; state.complete=false; render();
  // real, localized opener (no score expected)
  await runTurn('Briefly introduce this pillar in one short, friendly sentence, then ask me to describe our current practice. Do not include any tag.', {display:false, expectScore:false});
}
async function runTurn(userContent,{display,expectScore}){
  if(state.busy && display) return;
  if(display) state.messages.push({role:'u',text:userContent});
  state.convo.push({role:'user',content:userContent});
  const msg={role:'a',text:'',streaming:true,assessment:null};
  state.messages.push(msg); state.busy=true; render(); scrollChat();
  const idx=state.messages.length-1; let raw='';
  try{
    raw=await ollamaChat(state.convo,{temperature:expectScore?0.5:0.7,onToken:(t,full)=>{
      const node=document.querySelector('#msg-'+idx+' .bubble-text'); if(node)node.textContent=displayText(full); scrollChat();
    }});
    state.convo.push({role:'assistant',content:raw});
    if(expectScore){const a=extractAssessment(raw); if(a&&a.maturity){msg.assessment=a; state.assessments[PILLARS[state.pillar].id]=a;}}
    msg.text=displayText(raw)||raw.trim();
  }catch(e){ msg.text='⚠️ '+e.message; }
  msg.streaming=false; state.busy=false; render(); scrollChat();
}
function sendAnswer(){
  const ta=document.getElementById('ans'); if(!ta)return; const txt=ta.value.trim();
  if(!txt||state.busy)return; ta.value='';
  runTurn(txt,{display:true,expectScore:true});
}
function advance(){if(state.busy)return; if(state.pillar<PILLARS.length-1){state.pillar++;render();openPillar();} else {state.complete=true;render();}}

async function analyze(){
  const ta=document.getElementById('inc'); state.incidentText=ta?ta.value:state.incidentText;
  if(!state.incidentText.trim()||state.busy)return;
  state.busy=true;state.scan=null;state.scanError=null;render();
  try{
    const raw=await ollamaChat([{role:'system',content:incidentSystemPrompt()},{role:'user',content:state.incidentText}],{json:true,temperature:0.2});
    const cls=extractIncident(raw); if(!cls)throw new Error('Could not parse the classification. Try rephrasing the incident.');
    state.scan={cls,score:computeScore(cls.severity,state.likelihood,state.control)};
  }catch(e){ state.scanError=e.message; }
  state.busy=false;render();
}

function bind(){
  el.querySelectorAll('[data-lang]').forEach(n=>n.onclick=()=>{state.lang=n.dataset.lang;persist();render()});
  el.querySelectorAll('[data-jur]').forEach(n=>n.onclick=()=>{const id=n.dataset.jur;const j=JURIS.find(x=>x.id===id);if(j.always)return;
    state.juris.has(id)?state.juris.delete(id):state.juris.add(id);persist();render()});
  const ls=document.getElementById('langsel'); if(ls)ls.onchange=()=>{state.lang=ls.value;persist();render();
    if(state.screen==='home'&&state.tab==='assistant'&&!state.busy&&!state.complete)openPillar();};
  el.querySelectorAll('[data-tab]').forEach(n=>n.onclick=()=>{state.tab=n.dataset.tab;render();
    if(state.tab==='assistant'&&!state.messages.length&&!state.complete&&!state.busy)openPillar();});
  el.querySelectorAll('[data-seg]').forEach(n=>n.onclick=()=>{state[n.dataset.seg]=+n.dataset.v;
    const ta=document.getElementById('inc');if(ta)state.incidentText=ta.value;render()});
  el.querySelectorAll('[data-del]').forEach(n=>n.onclick=()=>{const i=+n.dataset.i;
    if(n.dataset.del==='tol')state.tolerances.splice(i,1);else state.vendors.splice(i,1);persist();render()});
  el.querySelectorAll('[data-act]').forEach(n=>n.onclick=()=>act(n.dataset.act));
}
function act(a){
  const g=id=>{const x=document.getElementById(id);return x?x.value.trim():''};
  switch(a){
    case'load':loadModel();break;
    case'start':start();break;
    case'about':state.modal=aboutModal();render();break;
    case'closemodal':state.modal=null;render();break;
    case'send':sendAnswer();break;
    case'advance':advance();break;
    case'analyze':analyze();break;
    case'addtol':state.modal=tolModal();render();break;
    case'addven':state.modal=venModal();render();break;
    case'savetol':{const s=g('m_service');if(!s)return;state.tolerances.push({service:s,rto:g('m_rto'),rpo:g('m_rpo'),mtpd:g('m_mtpd'),srto:g('m_srto')});state.modal=null;persist();render();break;}
    case'saveven':{const v=g('m_vendor');if(!v)return;const nth=g('m_nth').split(',').map(x=>x.trim()).filter(Boolean);
      state.vendors.push({vendor:v,service:g('m_prov'),nth});state.modal=null;persist();render();break;}
  }
}

render();
</script>
</body>
</html>
