<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Resilience Compass — On-device Gemma (Ollama)</title>
<style>
  :root{
    --bg:#0B1220; --surface:#141C2B; --surfaceAlt:#1C2740; --border:#243048;
    --primary:#3DD6C4; --accent:#6C8CFF; --text:#E6ECF5; --textSec:#95A3B8;
    --good:#4ADE80; --warn:#F5B841; --danger:#FF6B6B;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#05070d;color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .page{min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 12px;}
  .banner{max-width:440px;width:100%;font-size:12px;color:var(--textSec);text-align:center;line-height:1.5}
  .banner b{color:var(--good)}
  .device{width:440px;max-width:100%;height:840px;background:var(--bg);border:1px solid var(--border);
    border-radius:28px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);position:relative}
  #app{flex:1;min-height:0;display:flex;flex-direction:column}
  .body2{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden}
  .pad{padding:20px}
  h1{font-size:24px;font-weight:800;margin:0}
  h2{font-size:18px;font-weight:700;margin:0}
  .sub{color:var(--textSec)}
  .row{display:flex;align-items:center;gap:8px}
  .between{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;
    background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);color:var(--good);font-size:11px;font-weight:600}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good)}
  .label{font-size:14px;font-weight:600;margin:0 0 8px}
  .hint{font-size:12px;color:var(--textSec);margin:0 0 8px}
  .chip{padding:8px 12px;border-radius:999px;background:var(--surfaceAlt);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;user-select:none}
  .chip.sel{background:rgba(61,214,196,.18);border-color:var(--primary)}
  .wrap{display:flex;flex-wrap:wrap;gap:8px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:8px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 18px;border-radius:14px;
    background:var(--primary);color:#04231F;font-weight:700;border:none;cursor:pointer;font-size:15px;width:100%}
  .btn:disabled{opacity:.5;cursor:default}
  .btn.danger{background:var(--danger);color:#2A0A0A}
  .btn.tonal{background:rgba(61,214,196,.16);color:var(--primary);width:auto}
  .btn.ghost{background:transparent;color:var(--textSec);width:auto}
  .btn.sm{padding:8px 12px;font-size:13px;width:auto}
  input,textarea,select{width:100%;background:var(--surfaceAlt);border:1px solid var(--border);color:var(--text);
    border-radius:12px;padding:11px 12px;font-size:14px;font-family:inherit;outline:none}
  input:focus,textarea:focus{border-color:var(--primary)}
  textarea{resize:vertical}
  .pill{padding:3px 8px;border-radius:8px;font-size:10px;background:var(--surfaceAlt);color:var(--textSec)}
  .appbar{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
  .appbar .icons{display:flex;gap:8px;align-items:center}
  .iconbtn{background:transparent;border:none;color:var(--text);cursor:pointer;font-size:17px;padding:5px;border-radius:8px}
  .modeltag{font-size:10px;color:var(--primary);background:rgba(61,214,196,.12);border:1px solid rgba(61,214,196,.3);padding:2px 6px;border-radius:6px}
  /* hero */
  .hero{background:radial-gradient(120% 120% at 0% 0%, #17202f 0%, #0B1220 60%);border:1px solid var(--border);border-radius:20px;padding:22px}
  .herobadge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.09em;color:var(--danger);
    background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.4);padding:4px 10px;border-radius:999px}
  .concchip{display:inline-flex;align-items:center;gap:6px;background:rgba(245,184,65,.12);border:1px solid rgba(245,184,65,.45);
    color:var(--warn);font-size:12px;font-weight:600;padding:6px 10px;border-radius:10px;margin-top:4px}
  .steps{display:flex;gap:6px;margin:14px 0}
  .steps > div{flex:1;height:4px;border-radius:2px;background:var(--surfaceAlt)}
  .steps > div.on{background:var(--primary)}
  .upload{margin-top:14px;padding-top:14px;border-top:1px dashed var(--border)}
  .filebtn{display:inline-block;font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline}
  /* sim log */
  .simlog{display:flex;flex-direction:column;gap:10px;padding:0 16px 8px}
  .fac{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--danger);border-radius:12px;padding:12px 14px;line-height:1.5;white-space:pre-wrap;font-size:14px}
  .dec{align-self:flex-end;background:rgba(61,214,196,.14);border:1px solid rgba(61,214,196,.4);border-radius:12px;padding:10px 12px;max-width:88%;white-space:pre-wrap}
  .faclabel{color:var(--primary);font-weight:800}
  .injectlabel{color:var(--warn);font-weight:800}
  .cursor{display:inline-block;width:7px;height:1em;background:var(--danger);vertical-align:text-bottom;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  /* report */
  .report{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;line-height:1.55;font-size:14px}
  .report h3{color:var(--primary);font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin:16px 0 4px}
  .report h3:first-child{margin-top:0}
  /* advisor */
  .subtabs{display:flex;border-bottom:1px solid var(--border)}
  .stab{flex:1;text-align:center;padding:11px 4px;color:var(--textSec);cursor:pointer;font-size:12px}
  .stab.sel{color:var(--primary);border-bottom:2px solid var(--primary)}
  .bubble{max-width:88%;padding:12px 14px;border-radius:16px;margin:6px 0;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .bubble.a{background:var(--surface);border:1px solid var(--border);align-self:flex-start}
  .bubble.u{background:rgba(61,214,196,.14);border:1px solid rgba(61,214,196,.4);align-self:flex-end}
  .chatcol{display:flex;flex-direction:column;padding:0 16px}
  .mbadge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;margin-top:10px}
  .cite{display:inline-block;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:600;margin:6px 6px 0 0;background:rgba(108,140,255,.12);border:1px solid rgba(108,140,255,.35);color:var(--accent)}
  .seg{display:flex;border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .seg > div{flex:1;text-align:center;padding:9px 4px;cursor:pointer;font-size:13px;color:var(--text);border-right:1px solid var(--border)}
  .seg > div:last-child{border-right:none}
  .seg > div.sel{background:rgba(61,214,196,.18);color:var(--primary);font-weight:600}
  .gauge{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
  .gauge .hole{position:absolute;inset:8px;background:var(--surface);border-radius:50%}
  .gauge span{position:relative;font-weight:800}
  .tag{display:inline-block;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:600;margin:0 6px 6px 0}
  .divider{height:1px;background:var(--border);margin:16px 0}
  .sechead{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px}
  .empty{color:var(--textSec);font-style:italic;padding:10px 0}
  .modal{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:20}
  .sheet{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;width:100%;max-height:90%;overflow-y:auto}
  .field{margin-bottom:10px}.field small{color:var(--textSec);display:block;margin-bottom:4px}
  .fadein{animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  /* Dr. Owl mascot */
  .owl{display:flex;flex-direction:column;align-items:center;gap:8px}
  .owl.compact{flex-direction:row;align-items:center;gap:10px}
  .owlchar{width:88px;height:98px;flex:0 0 auto}
  .owl.compact .owlchar{width:54px;height:60px}
  .owlsvg{display:block;width:100%;height:100%;transform-origin:center bottom;animation:owlbob 3.4s ease-in-out infinite}
  .owlname{font-size:10px;color:var(--textSec)}
  .owlbubble{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 13px;font-size:13px;max-width:300px;text-align:center;position:relative;line-height:1.45;color:var(--text)}
  .owl:not(.compact) .owlbubble:after{content:"";position:absolute;bottom:-7px;left:50%;transform:translateX(-50%) rotate(45deg);width:12px;height:12px;background:var(--surface);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .owl.compact .owlbubble{text-align:left;max-width:230px}
  .eyelid,.brow,.beak,.tassel,.tasselend{transform-box:fill-box}
  .eyelid{transform-origin:center top;transform:scaleY(0);animation:owlblink 4.8s infinite}
  .brow{transform-origin:center;transition:transform .25s}
  .beak{transform-origin:center top}
  .happyeye{opacity:0}
  .tassel,.tasselend{transform-origin:top center;animation:owlswing 3.8s ease-in-out infinite}
  @keyframes owlbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  @keyframes owlblink{0%,92%,100%{transform:scaleY(0)}94%,97%{transform:scaleY(1)}}
  @keyframes owlswing{0%,100%{transform:rotate(-9deg)}50%{transform:rotate(11deg)}}
  @keyframes owlshake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px) rotate(-2deg)}40%{transform:translateX(3px) rotate(2deg)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
  @keyframes owlhop{0%{transform:translateY(0)}35%{transform:translateY(-15px) rotate(-3deg)}70%{transform:translateY(0)}85%{transform:translateY(-5px)}100%{transform:translateY(0)}}
  @keyframes owltalk{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.7) translateY(1px)}}
  @keyframes concpulse{0%,100%{box-shadow:0 0 0 0 rgba(245,184,65,0)}50%{box-shadow:0 0 0 4px rgba(245,184,65,.16)}}
  .concchip{animation:concpulse 2.6s ease-in-out infinite}
  .owl.thinking .owlsvg{animation:owlbob 1.5s ease-in-out infinite}
  .owl.thinking .brow{transform:translateY(-2px)}
  .owl.alert .browL{transform:rotate(9deg) translateY(2px)}
  .owl.alert .browR{transform:rotate(-9deg) translateY(2px)}
  .owl.alert .eyelid{animation:none}
  .owl.alert .owlbubble{border-color:rgba(255,107,107,.45)}
  .owl.alarmed .owlsvg{animation:owlshake .5s ease, owlbob 3.4s ease-in-out .5s infinite}
  .owl.alarmed .browL{transform:rotate(14deg) translateY(3px)}
  .owl.alarmed .browR{transform:rotate(-14deg) translateY(3px)}
  .owl.alarmed .eyelid{animation:none}
  .owl.happy .owlsvg{animation:owlhop .6s ease, owlbob 3.4s ease-in-out .6s infinite}
  .owl.happy .pupil{opacity:0}
  .owl.happy .happyeye{opacity:1}
  .owl.happy .eyelid{animation:none}
  .owl.talking .beak{animation:owltalk .26s ease-in-out infinite}
  .owlhelper{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surfaceAlt)}
  .owlhelper .owl.compact{flex:1;min-width:0}
  .owlhelper .owlbubble{flex:1;max-width:none;font-size:12px;padding:8px 11px}
  .owlhelper .owlchar{width:44px;height:49px}
</style>
</head>

// ================= scoring + concentration =================
function sevWeight(s){return s==='low'?1:s==='high'?3:2}
function computeScore(sev,lik,ctrl){const s=sevWeight(sev),l=Math.min(3,Math.max(1,lik)),c=Math.min(4,Math.max(1,ctrl));
  const inh=(s*l-1)/8, cf=(c-1)/3, res=inh*(1-cf); return Math.max(0,Math.min(100,Math.round(100*(1-res))));}
function concentrationRisks(){const by={};
  state.vendors.forEach(v=>{const seen=new Set();(v.nth||[]).forEach(p=>{const k=(''+p).trim().toLowerCase();if(!k||seen.has(k))return;seen.add(k);
    if(!by[k])by[k]={display:(''+p).trim(),vendors:[]};if(!by[k].vendors.includes(v.vendor))by[k].vendors.push(v.vendor);});});
  return Object.values(by).filter(a=>a.vendors.length>=2).sort((a,b)=>b.vendors.length-a.vendors.length);}

// ================= Gemma via local Ollama =================
function gemmaVer(n){const m=n.match(/gemma\s*([0-9]+)/i);return m?parseInt(m[1],10):0;}
const PREFERRED_MODEL='gemma3:4b'; // snappy for the live demo; falls back to newest Gemma if absent
async function detectModel(){
  const r=await fetch('/api/tags',{cache:'no-store'}); if(!r.ok)throw new Error('Ollama not reachable (HTTP '+r.status+')');
  const names=((await r.json()).models||[]).map(m=>m.name);
  const exact=names.find(n=>n===PREFERRED_MODEL||n===PREFERRED_MODEL+':latest');
  if(exact)return exact;
  const g=names.filter(n=>/gemma/i.test(n)).sort((a,b)=>gemmaVer(b)-gemmaVer(a));
  const tag=g[0]||names[0]; if(!tag)throw new Error('No model in Ollama. Run:  ollama pull gemma3:4b'); return tag;
}
async function ollamaChat(messages,{json=false,temperature=0.6,onToken}={}){
  const body={model:state.modelTag,messages,stream:true,options:{temperature}}; if(json)body.format='json';
  const resp=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});
  if(!resp.ok)throw new Error('Gemma call failed (HTTP '+resp.status+')');
  const reader=resp.body.getReader(),dec=new TextDecoder(); let buf='',full='';
  while(true){const {done,value}=await reader.read(); if(done)break; buf+=dec.decode(value,{stream:true}); let i;
    while((i=buf.indexOf('\n'))>=0){const line=buf.slice(0,i).trim(); buf=buf.slice(i+1); if(!line)continue;
      let o; try{o=JSON.parse(line)}catch(e){continue} if(o.error)throw new Error(o.error);
      const t=o.message&&o.message.content||''; if(t){full+=t; onToken&&onToken(t,full);}}}
  return full;
}
function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res((''+r.result).split(',')[1]||'');r.onerror=rej;r.readAsDataURL(file);});}

function groundingFor(pillar){
  if(pillar.id==='tolerance'&&state.tolerances.length){
    const l=state.tolerances.map(t=>'- '+t.service+': '+([t.rto&&'RTO '+t.rto,t.rpo&&'RPO '+t.rpo,t.mtpd&&'MTPD '+t.mtpd,t.srto&&'SRTO '+t.srto].filter(Boolean).join(', ')||'(no objectives set)'));
    return '\n\nThe practitioner has entered these impact tolerances — use them directly:\n'+l.join('\n');}
  if(pillar.id==='third-party'&&state.vendors.length){
    const l=state.vendors.map(v=>'- '+v.vendor+(v.service?' ('+v.service+')':'')+': '+((v.nth&&v.nth.length)?v.nth.join(', '):'(none)'));
    const r=concentrationRisks(); const rk=r.length?'\nConcentration risks: '+r.map(x=>x.display+' (shared by '+x.vendors.join(', ')+')').join('; '):'';
    return '\n\nThe practitioner has mapped these vendors/Nth-parties — use them directly:\n'+l.join('\n')+rk;}
  return '';
}

function incidentSystemPrompt(){const lang=replyLang(),cats=CATEGORIES.join(', ');
  return `You are Resilience Compass, an incident classifier for banks. Classify the incident into EXACTLY ONE category from: ${cats}.
Return ONLY a JSON object: {"category":"<one of: ${cats}>","severity":"low|medium|high","impactArea":"<short phrase in ${lang}>","rationale":"<one short sentence in ${lang}>"}`;}
const ASSESS='[[ASSESSMENT]]';
function firstJsonObject(s){const st=s.indexOf('{'); if(st<0)return null; let d=0,ins=false,esc2=false;
  for(let i=st;i<s.length;i++){const ch=s[i];
    if(ins){if(esc2){esc2=false;}else if(ch==='\\'){esc2=true;}else if(ch==='"'){ins=false;}continue;}
    if(ch==='"'){ins=true;}else if(ch==='{'){d++;}else if(ch==='}'){d--;if(d===0)return s.slice(st,i+1);}}
  return null;}
function displayText(raw){const i=raw.indexOf(ASSESS);return (i>=0?raw.slice(0,i):raw).trim();}
function extractAssessment(raw){const i=raw.indexOf(ASSESS); if(i<0)return null; const tail=raw.slice(i+ASSESS.length);
  let m=null; const obj=firstJsonObject(tail); if(obj){try{m=JSON.parse(obj)}catch(e){}}
  if(!m){const mm=tail.match(/"maturity"\s*:\s*(\d)/); if(!mm)return null;
    const rr=tail.match(/"rationale"\s*:\s*"([^"]*)"/), cc=tail.match(/"citations"\s*:\s*\[([^\]]*)\]/);
    m={maturity:parseInt(mm[1],10),rationale:rr?rr[1]:'',citations:cc?(cc[1].match(/"([^"]*)"/g)||[]).map(x=>x.replace(/"/g,'')):[]};}
  let mat=m.maturity; if(typeof mat==='string')mat=parseInt(mat,10); mat=(typeof mat==='number'&&!isNaN(mat))?Math.max(1,Math.min(4,Math.round(mat))):null;
  const cites=Array.isArray(m.citations)?m.citations.map(x=>(''+x).trim()).filter(Boolean):[];
  return {maturity:mat,citations:cites,rationale:(m.rationale||'').toString()};}
function extractIncident(raw){const obj=firstJsonObject(raw); if(!obj)return null; let m; try{m=JSON.parse(obj)}catch(e){return null}
  let cat=(m.category||'').toString().trim().toLowerCase();
  if(!CATEGORIES.includes(cat))cat=CATEGORIES.find(c=>cat.includes(c)||c.includes(cat))||(/(vendor|supplier|party)/.test(cat)?'third-party':/(tech|system|it)/.test(cat)?'technology':'process');
  let sev=(m.severity||'').toString().trim().toLowerCase(); if(sev==='moderate')sev='medium'; if(!['low','medium','high'].includes(sev))sev='medium';
  return {category:cat,severity:sev,impactArea:(m.impactArea||m.impact_area||'').toString().trim(),rationale:(m.rationale||'').toString().trim()};}

function bankProfileText(){
  const svcs=state.tolerances.map(t=>t.service).filter(Boolean);
  const vends=state.vendors.map(v=>v.vendor+(v.service?' ('+v.service+')':'')+' → '+((v.nth&&v.nth.length)?v.nth.join(', '):'—'));
  const risks=concentrationRisks().map(r=>r.display+' (shared by '+r.vendors.join(', ')+')');
  let s='This bank:\n';
  if(svcs.length)s+='- Critical services: '+svcs.join('; ')+'\n';
  if(vends.length)s+='- Vendors → Nth-party: '+vends.join(' | ')+'\n';
  if(risks.length)s+='- KNOWN CONCENTRATION RISK (exploit this): '+risks.join('; ')+'\n';
  return s.trim();
}

function owlWidget(mood,line,compact){
  const cls='owl '+(mood||'idle')+(compact?' compact':'');
  const bubble=line?`<div class="owlbubble" id="owlbubble">${esc(line)}</div>`:'';
  const inner=compact?`<div class="owlchar">${owlSvg()}</div>${bubble}`
    :`${bubble}<div class="owlchar">${owlSvg()}</div><div class="owlname">${esc(owlT().name)} · ${esc(owlT().poweredBy)}</div>`;
  return `<div class="${cls}" id="owl">${inner}</div>`;
}
function fmtFacDisplay(raw){return fmtFacilitator(raw.replace(/^\s*QUESTION:.*$/gmi,'').trim());}
function lastQuestion(){for(let i=sim.log.length-1;i>=0;i--){const m=sim.log[i]; if(m.role==='fac'&&m.text){const q=m.text.match(/QUESTION:\s*([^\n]+)/i); if(q)return q[1].trim();}}return '';}
function owlLineForSim(){ if(sim.busy)return owlT().readingSituation; const q=lastQuestion(); return q||owlT().yourMove; }
function gaugeCount(score){const col=bandColor(score);return `<div class="gauge" style="width:84px;height:84px;background:conic-gradient(${col} ${score*3.6}deg, var(--surfaceAlt) 0)"><div class="hole"></div><span style="color:${col};font-size:26px" data-countup="${score}">0</span></div>`;}

// ---- Dr. Owl as a live helper on the Advisor tabs (uses real Gemma) ----
function defaultTip(tab){const o=owlT();return tab==='assistant'?o.tipAssistant:tab==='scanner'?o.tipScanner:o.tipTools;}
function helperOwl(tab){
  const t=state.owlTip, busy=t.busy;
  const line=busy?owlT().thinking:(t[tab]||defaultTip(tab));
  const disabled=(busy||state.busy)?'disabled':'';
  const btn=`<button class="iconbtn" data-act="owltip" title="${esc(owlT().name)} · Gemma" ${disabled}>${busy?'…':(t[tab]?'↻':'💡')}</button>`;
  return `<div class="owlhelper">${owlWidget(busy?'thinking':'idle', line, true)}${btn}</div>`;
}
async function fetchOwlTip(tab){
  if(state.owlTip.busy||state.busy||state.modelStatus!=='ready')return;
  state.owlTip.busy=true; render();
  const ow=document.getElementById('owl'); if(ow)ow.classList.add('talking');
  const lang=replyLang(); let prompt;
  if(tab==='assistant'){const p=PILLARS[state.pillar];
    prompt='You are '+owlT().name+', a warm, concise operational-resilience coach for a bank. In 35 words or fewer, give one concrete tip on what a strong, regulator-aligned answer looks like for the pillar "'+p.title+'". Mention which of these regulators cares most: '+activeJuris().map(j=>j.name).join(', ')+'. Reply in '+lang+', first person, no preamble.';}
  else if(tab==='scanner'){
    prompt='You are '+owlT().name+', a warm, concise resilience coach. In 35 words or fewer, tell the user what details to include when describing an operational incident so it can be classified and scored accurately. Reply in '+lang+', first person, no preamble.';}
  else {const r=concentrationRisks();
    prompt=r.length?('You are '+owlT().name+', a warm resilience coach. In 40 words or fewer, warn about this concentration risk and suggest one concrete mitigation: "'+r[0].display+'" is shared by '+r[0].vendors.join(', ')+'. Reply in '+lang+', first person, no preamble.')
      :('You are '+owlT().name+', a warm resilience coach. In 35 words or fewer, explain why mapping Nth-party (fourth-party) dependencies matters for operational resilience. Reply in '+lang+', first person, no preamble.');}
  try{ state.owlTip[tab]=await ollamaChat([{role:'user',content:prompt}],{temperature:0.6,onToken:(t2,full)=>{const b=document.getElementById('owlbubble'); if(b)b.textContent=full;}});
  }catch(e){ state.owlTip[tab]=owlT().error; }
  state.owlTip.busy=false; render();
}
function simScroll(){const c=document.getElementById('simlog'); if(c)c.scrollTop=c.scrollHeight;}

async function startSim(){
  if(state.modelStatus!=='ready'||sim.busy)return;
  sim.phase='running'; sim.convo=[{role:'system',content:simSystemPrompt()}]; sim.log=[]; sim.turns=0; sim.report=''; render();
  await simTurn('Begin the exercise.', false);
}
async function simTurn(userContent, display){
  sim.convo.push({role:'user',content:userContent});
  if(display) sim.log.push({role:'dec',text:userContent});
  const entry={role:'fac',text:'',streaming:true}; sim.log.push(entry);
  sim.busy=true; render(); simScroll();
  const ow=document.getElementById('owl'); if(ow)ow.classList.add('talking');
  const idx=sim.log.length-1; let raw='';
  try{ raw=await ollamaChat(sim.convo,{temperature:0.85,onToken:(t,full)=>{const n=document.getElementById('log-'+idx); if(n)n.innerHTML=fmtFacDisplay(full)+'<span class="cursor"></span>'; simScroll();}});
    sim.convo.push({role:'assistant',content:raw}); entry.text=raw;
  }catch(e){ entry.text='⚠️ '+e.message; }
  entry.streaming=false; sim.busy=false; render(); simScroll();
}
function submitDecision(){const ta=document.getElementById('decision'); if(!ta)return; const t=ta.value.trim(); if(!t||sim.busy)return; ta.value=''; sim.turns++; simTurn(t,true);}
async function endSim(){
  if(sim.busy)return; sim.phase='report'; sim.report=''; sim.reportBusy=true; render();
  try{ sim.report=await ollamaChat([...sim.convo,{role:'user',content:reportRequest()}],{temperature:0.4,onToken:(t,full)=>{const n=document.getElementById('reportbody'); if(n)n.innerHTML=fmtReport(full);}});
  }catch(e){ sim.report='⚠️ '+e.message; }
  sim.reportBusy=false; render();
}
function restartSim(){ sim.phase='intro'; sim.log=[]; sim.convo=[]; sim.turns=0; sim.report=''; render(); }
async function seedFromImage(file){
  if(!file||state.modelStatus!=='ready'){return;}
  sim.seeding=true; sim.seedMsg='Reading your diagram with Gemma (on-device vision)…'; render();
  try{
    const b64=await fileToB64(file);
    const raw=await ollamaChat([{role:'user',content:'This is a bank IT architecture or vendor diagram. Extract JSON only: {"vendors":[{"vendor":"name","service":"what it provides","nth":["cloud or sub-providers shown"]}]}. Include any shared cloud provider as an nth entry.',images:[b64]}],{json:true,temperature:0.2});
    const obj=firstJsonObject(raw); const parsed=obj?JSON.parse(obj):null;
    const vs=(parsed&&Array.isArray(parsed.vendors))?parsed.vendors.filter(v=>v&&v.vendor):[];
    if(vs.length){ state.vendors=vs.map(v=>({vendor:(''+v.vendor).slice(0,40),service:(''+(v.service||'')).slice(0,60),nth:Array.isArray(v.nth)?v.nth.map(x=>(''+x).slice(0,40)):[]})); persist();
      const rk=concentrationRisks(); sim.seedMsg='Imported '+vs.length+' vendors'+(rk.length?' — concentration risk on '+rk[0].display+'.':'.'); }
    else sim.seedMsg='No vendors detected in the image — keeping the sample bank.';
  }catch(e){ sim.seedMsg='Could not read the image ('+e.message+').'; }
  sim.seeding=false; render();
}

async function genPack(){
  const ta=document.getElementById('inc'); if(ta)state.incidentText=ta.value;
  if(!state.incidentText.trim()||state.packBusy)return;
  state.packBusy=true; state.pack=null; render();
  try{ const sys='You are a bank incident-response assistant. Reply in '+replyLang()+'. For the incident, produce a concise response pack with these exact markdown headers: ## Likely root cause  ## Regulators to notify  (name them + a 2-line draft notice)  ## Customer message  (1-2 lines)  ## Top 3 remediation actions. Under 220 words.';
    state.pack=await ollamaChat([{role:'system',content:sys},{role:'user',content:state.incidentText}],{temperature:0.4});
  }catch(e){ state.pack='⚠️ '+e.message; }
  state.packBusy=false; render();
}

// ================= views =================
function render(){ el.innerHTML=viewShell(); if(state.modal)el.insertAdjacentHTML('beforeend',state.modal); bind(); }
function viewShell(){ return header()+`<div class="body2">${state.view==='sim'?viewSim():viewAdvisor()}</div>`; }
function header(){
  const st=state.modelStatus;
  const status=st==='ready'?`<span class="modeltag">${esc(state.modelTag||'')}</span>`
    :st==='loading'?`<span class="sub" style="font-size:11px">warming…</span>`
    :st==='error'?`<span style="color:var(--danger);font-size:11px" title="${esc(state.modelError||'')}">offline</span>`
    :`<span class="sub" style="font-size:11px">connecting…</span>`;
  const langOpts=Object.entries(LANGS).map(([k,v])=>`<option value="${k}" ${state.lang===k?'selected':''}>${v}</option>`).join('');
  return `<div class="appbar">
    <div class="row"><b>Resilience Compass</b><span class="badge"><span class="dot"></span>${S().offline}</span></div>
    <div class="icons">${status}<select id="langsel" style="width:auto;padding:5px 6px">${langOpts}</select>
      <button class="iconbtn" data-act="toggleview" title="${state.view==='sim'?'Advisor tools':'Crisis simulator'}">${state.view==='sim'?'🧰':'🔴'}</button>
      <button class="iconbtn" data-act="about">ⓘ</button></div></div>`;
}

  const body=tab==='assistant'?viewAssistant():tab==='scanner'?viewScanner():viewTools();
  return `<div style="display:flex;flex-direction:column;height:100%">
    <div class="subtabs">
      <div class="stab ${tab==='assistant'?'sel':''}" data-adv="assistant">💬 ${s.tabA}</div>
      <div class="stab ${tab==='scanner'?'sel':''}" data-adv="scanner">🛰️ ${s.tabS}</div>
      <div class="stab ${tab==='tools'?'sel':''}" data-adv="tools">🛠️ ${s.tabT}</div>
    </div>
    ${helperOwl(tab)}
    <div style="flex:1;min-height:0;overflow-y:auto">${body}</div></div>`;
}
function viewAssistant(){ const s=S(),p=PILLARS[state.pillar];
  if(state.complete){ const scored=Object.values(state.assessments).filter(a=>a.maturity);
    const overall=scored.length?Math.round(scored.reduce((x,a)=>x+a.maturity,0)/scored.length/4*100):0;
    const rows=PILLARS.map(pl=>{const a=state.assessments[pl.id];
      return `<div class="card between"><span style="font-size:14px">${pl.title}</span>${a&&a.maturity?`<span class="mbadge" style="margin:0;color:${matColor(a.maturity)};background:${matColor(a.maturity)}22;border:1px solid ${matColor(a.maturity)}80">${s.maturity} ${a.maturity}/4</span>`:'<span class="sub">—</span>'}</div>`}).join('');
    return `<div class="pad fadein" style="text-align:center"><h2 style="text-align:center">${s.done}</h2><div style="height:16px"></div>
      ${gauge(overall,120)}<div class="sub" style="margin-top:8px">${s.overall}</div><div style="height:20px"></div><div style="text-align:left">${rows}</div></div>`;}
  const msgs=state.messages.map((m,i)=>{ if(m.role==='u')return `<div class="bubble u">${esc(m.text)}</div>`;
    const a=m.assessment; let extra=''; if(a&&a.maturity){extra=`<div><span class="mbadge" style="color:${matColor(a.maturity)};background:${matColor(a.maturity)}22;border:1px solid ${matColor(a.maturity)}80">${s.maturity} ${a.maturity}/4</span></div><div>${a.citations.map(c=>`<span class="cite">${esc(c)}</span>`).join('')}</div>`;}
    return `<div class="bubble a" id="amsg-${i}"><span class="bubble-text">${esc(m.text)}</span>${m.streaming?'<span class="cursor"></span>':''}${extra}</div>`;}).join('');
  return `<div style="display:flex;flex-direction:column;height:100%">
    <div class="pad" style="padding:12px 16px 8px"><div class="hint">${s.pillar} ${state.pillar+1} ${s.of} ${PILLARS.length} · ${p.title}</div>
      <div class="progress" style="height:6px;border-radius:999px;background:var(--surfaceAlt);overflow:hidden"><i style="display:block;height:100%;background:var(--primary);width:${(state.pillar+1)/PILLARS.length*100}%"></i></div></div>
    <div class="chatcol" id="achat" style="flex:1;overflow-y:auto">${msgs}</div>
    <div class="pad" style="padding-top:8px">
      <div class="row"><textarea id="ans" rows="1" placeholder="${s.answer}" ${state.busy?'disabled':''}></textarea>
        <button class="btn" style="width:auto" data-act="asend" ${state.busy?'disabled':''}>➤</button></div>
      <div class="between" style="margin-top:8px"><button class="btn ghost sm" data-act="aadvance" ${state.busy?'disabled':''}>${s.skip}</button>
        <button class="btn tonal sm" data-act="aadvance" ${state.busy?'disabled':''}>${state.pillar<PILLARS.length-1?s.next:s.done} →</button></div></div></div>`;
}
function viewScanner(){ const s=S(); let result='';
  if(state.scanError)result=`<div style="color:var(--danger);margin-top:16px">${esc(state.scanError)}</div>`;
  else if(state.scan){const c=state.scan.cls;const col=c.severity==='low'?'var(--good)':c.severity==='high'?'var(--danger)':'var(--warn)';
    const catLabel=c.category.replace('-',' ').replace(/^./,x=>x.toUpperCase()); const sevLabel=c.severity==='low'?s.low:c.severity==='high'?s.high:s.med;
    result=`<div class="card fadein" style="display:flex;gap:16px;margin-top:16px">
      <div style="text-align:center">${gauge(state.scan.score,96)}<div class="hint" style="margin-top:6px">${s.score}</div></div>
      <div style="flex:1"><div><span class="sub">${s.category}: </span><b>${catLabel}</b></div>

    <div style="height:14px"></div><div class="label">${s.control}</div>${seg('control',[{v:1,l:'1'},{v:2,l:'2'},{v:3,l:'3'},{v:4,l:'4'}])}
    <div style="height:18px"></div>
    <div class="row"><button class="btn" data-act="analyze" ${state.busy?'disabled':''}>${state.busy?'…':'🛰️ '+s.analyze}</button>

    ${result}${pack}</div>`;
}
function viewTools(){ const s=S();

}
function gauge(score,size){const col=bandColor(score);

  <div class="field"><small>${s.nth}</small><input id="m_nth" placeholder="AWS, Cloudflare, ..."></div>
  <div class="between" style="margin-top:8px"><button class="btn ghost sm" data-act="closemodal">Cancel</button><button class="btn sm" data-act="saveven">${s.add}</button></div></div></div>`}
function aboutModal(){const s=S();return `<div class="modal"><div class="sheet fadein"><span class="badge"><span class="dot"></span>${s.offline}</span>
  <div style="height:14px"></div><div class="card"><div class="row"><span>🔒</span><div>${s.privacy}</div></div></div>
  <div class="hint">On-device model (Ollama): <span class="modeltag">${esc(state.modelTag||'—')}</span></div><div style="height:8px"></div>
  <div class="card"><div class="row"><span>ℹ️</span><b>${s.disc}</b></div><div class="hint" style="margin-top:8px">${DISCLAIMER}</div></div>
  <div style="text-align:right;margin-top:8px"><button class="btn sm" data-act="closemodal">OK</button></div></div></div>`}

// ================= advisor behaviour =================
async function autoConnect(){
  if(state.modelStatus==='ready'||state.modelStatus==='loading')return;
  state.modelStatus='loading'; render();
  try{ state.modelTag=await detectModel(); render();
    await ollamaChat([{role:'user',content:'Reply with the single word: ready'}],{temperature:0,onToken:()=>{}});
    state.modelStatus='ready'; persist(); render();
  }catch(e){ state.modelStatus='error'; state.modelError=e.message; render(); }
}
function aScroll(){const c=document.getElementById('achat'); if(c)c.scrollTop=c.scrollHeight;}
async function openPillar(){ if(state.busy)return; const p=PILLARS[state.pillar];
  state.messages=[]; state.convo=[{role:'system',content:bcmSystemPrompt(p)}]; state.complete=false; render();
  await aTurn('Briefly introduce this pillar in one short sentence, then ask me to describe our current practice. No tag.', false, false);
}
async function aTurn(userContent, display, expectScore){ const chatEmpty=false;
  if(display) state.messages.push({role:'u',text:userContent}); state.convo.push({role:'user',content:userContent});
  const msg={role:'a',text:'',streaming:true,assessment:null}; state.messages.push(msg); state.busy=true; render(); aScroll();
  const idx=state.messages.length-1; let raw='';
  try{ raw=await ollamaChat(state.convo,{temperature:expectScore?0.5:0.7,onToken:(t,full)=>{const n=document.querySelector('#amsg-'+idx+' .bubble-text'); if(n)n.textContent=displayText(full); aScroll();}});
    state.convo.push({role:'assistant',content:raw});
    if(expectScore){const a=extractAssessment(raw); if(a&&a.maturity){msg.assessment=a; state.assessments[PILLARS[state.pillar].id]=a;}}
    msg.text=displayText(raw)||raw.trim();
  }catch(e){ msg.text='⚠️ '+e.message; }
  msg.streaming=false; state.busy=false; render(); aScroll();
}
function aSend(){const ta=document.getElementById('ans'); if(!ta)return; const t=ta.value.trim(); if(!t||state.busy)return; ta.value=''; aTurn(t,true,true);}
function aAdvance(){ if(state.busy)return; if(state.pillar<PILLARS.length-1){state.pillar++; render(); openPillar();} else {state.complete=true; render();}}
async function analyze(){ const ta=document.getElementById('inc'); state.incidentText=ta?ta.value:state.incidentText;
  if(!state.incidentText.trim()||state.busy)return; state.busy=true; state.scan=null; state.scanError=null; render();
  try{ const raw=await ollamaChat([{role:'system',content:incidentSystemPrompt()},{role:'user',content:state.incidentText}],{json:true,temperature:0.2});
    const cls=extractIncident(raw); if(!cls)throw new Error('Could not parse the classification.');
    state.scan={cls,score:computeScore(cls.severity,state.likelihood,state.control)};
  }catch(e){ state.scanError=e.message; } state.busy=false; render();
}

// ================= bind =================
function bind(){
  const ls=document.getElementById('langsel'); if(ls)ls.onchange=()=>{state.lang=ls.value; persist(); render();};
  const fi=document.getElementById('seedimg'); if(fi)fi.onchange=e=>{const f=e.target.files&&e.target.files[0]; if(f)seedFromImage(f);};
  el.querySelectorAll('[data-adv]').forEach(n=>n.onclick=()=>{state.advTab=n.dataset.adv; render();
    if(state.advTab==='assistant'&&!state.messages.length&&!state.complete&&!state.busy)openPillar();
    else if((state.advTab==='scanner'||state.advTab==='tools')&&!state.owlTip[state.advTab]&&!state.owlTip.busy&&!state.busy)fetchOwlTip(state.advTab);});
  el.querySelectorAll('[data-seg]').forEach(n=>n.onclick=()=>{state[n.dataset.seg]=+n.dataset.v; const ta=document.getElementById('inc'); if(ta)state.incidentText=ta.value; render();});
  el.querySelectorAll('[data-del]').forEach(n=>n.onclick=()=>{const i=+n.dataset.i; if(n.dataset.del==='tol')state.tolerances.splice(i,1); else state.vendors.splice(i,1); persist(); render();});
  el.querySelectorAll('[data-act]').forEach(n=>n.onclick=()=>act(n.dataset.act));
  el.querySelectorAll('[data-countup]').forEach(n=>{const to=+n.dataset.countup||0; let cur=0; const step=Math.max(1,Math.round(to/35)); const iv=setInterval(()=>{cur+=step; if(cur>=to){cur=to;clearInterval(iv);} n.textContent=cur;},26);});
}
function act(a){ const g=id=>{const x=document.getElementById(id);return x?x.value.trim():''};
  switch(a){
    case'toggleview': state.view=state.view==='sim'?'advisor':'sim'; render();
      if(state.view==='advisor'){ if(state.advTab==='assistant'&&!state.messages.length&&!state.complete&&!state.busy)openPillar();
        else if((state.advTab==='scanner'||state.advTab==='tools')&&!state.owlTip[state.advTab]&&!state.owlTip.busy&&!state.busy)fetchOwlTip(state.advTab); }
      break;
    case'owltip': fetchOwlTip(state.advTab); break;
    case'about': state.modal=aboutModal(); render(); break;
    case'closemodal': state.modal=null; render(); break;
    case'simstart': startSim(); break;
    case'decide': submitDecision(); break;
    case'endsim': endSim(); break;
    case'restartsim': restartSim(); break;
    case'asend': aSend(); break;
    case'aadvance': aAdvance(); break;
    case'analyze': analyze(); break;
    case'genpack': genPack(); break;
    case'addtol': state.modal=tolModal(); render(); break;
    case'addven': state.modal=venModal(); render(); break;
    case'savetol':{const s=g('m_service'); if(!s)return; state.tolerances.push({service:s,rto:g('m_rto'),rpo:g('m_rpo'),mtpd:g('m_mtpd'),srto:g('m_srto')}); state.modal=null; persist(); render(); break;}
    case'saveven':{const v=g('m_vendor'); if(!v)return; const nth=g('m_nth').split(',').map(x=>x.trim()).filter(Boolean); state.vendors.push({vendor:v,service:g('m_prov'),nth}); state.modal=null; persist(); render(); break;}
  }
}

render();
autoConnect();
</script>
</body>
</html>
