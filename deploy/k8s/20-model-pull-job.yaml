# One-shot Job: pull the Gemma model into the Ollama volume once it's up.
# (Skip this if you use the NVIDIA NIM backend — NIM fetches its own weights.)
apiVersion: batch/v1
kind: Job
metadata:
  name: model-pull
  namespace: resilience-compass
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: ollama/ollama:latest
          env:
            - { name: OLLAMA_HOST, value: "ollama:11434" }
            - { name: MODEL, value: "gemma3:4b" }
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "waiting for ollama service...";
              until ollama list >/dev/null 2>&1; do sleep 3; done;
              echo "pulling $MODEL"; ollama pull "$MODEL";
              echo "pulling nomic-embed-text (DORA article RAG)"; ollama pull nomic-embed-text; echo "done."
